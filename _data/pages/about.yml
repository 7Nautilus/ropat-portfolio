  intro_2: "Autodidacte pur jus. J'ai commencé deux formations en design, lâchées rapidement parce qu'elles ne m'apprenaient rien que je ne savais pas déjà trouver sur internet. Aujourd'hui j'accompagne des artistes et des entreprises qui veulent une identité visuelle qui leur ressemble vraiment."

