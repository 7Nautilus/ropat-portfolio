en:
  title: "About"

  intro_1: "I'm Ropat, a graphic designer & art director based in Angers. I've been tinkering with stuff on my computer for as long as I can remember, but it was only about 2-3 years ago that I decided to make it my career."
  intro_2: "Pure self-taught. I started two design courses, but quickly dropped them because they didn't teach me anything I couldn't already find on the internet. Today, I work with artists and businesses who want a visual identity that truly reflects them."

  availability: "Available for new projects"

