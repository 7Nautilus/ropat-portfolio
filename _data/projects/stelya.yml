context_sections:
  - title:
      fr: "Brief et objectifs"
      en: "Brief and Objectives"
    content:
      fr: |
        Stelya est un cabinet de conseil en ingénierie dont la promesse repose sur une idée forte : **faire grandir ses clients à travers la collaboration**. L'identité visuelle devait incarner cette ambition tout en reflétant les valeurs du secteur : **rigueur technique, stabilité et vision stratégique**.
      en: |
        Stelya is an engineering consulting firm built around a core promise: **helping clients grow through collaboration**. The visual identity had to embody that ambition while reflecting the values of the industry: **technical precision, stability, and strategic vision**.

  - title:
      fr: "Concept & construction du logo"
      en: "Concept & Logo Construction"
    content:
      fr: |
        Pour ancrer le logo dans l'univers de l'ingénierie, j'ai opté pour une **construction sur grille vectorielle stricte**, garantissant des proportions rigoureuses entre chaque élément. Cette approche structurée renforce la crédibilité et le sérieux de la marque.

        La promesse de Stelya est traduite visuellement par une **étoile filante** dont la traîne prend naissance à la base des lettres et se prolonge jusqu'à la fin du logotype, un symbole discret mais chargé de sens, évoquant l'élan, la trajectoire et la croissance des clients accompagnés.
      en: |
        To ground the logo in the engineering world, I built it on a **strict vector grid**, ensuring rigorous proportions between every element. This structured approach reinforces the brand's credibility and professionalism.

        Stelya's promise is expressed visually through a **shooting star** whose tail originates at the base of the letterforms and extends to the end of the logotype, a subtle yet meaningful symbol evoking momentum, trajectory, and the growth of the clients they support.

  - title:
      fr: "Typographie"
      en: "Typography"
    content:
      fr: |
        Après plusieurs échanges avec le client, notre choix s'est porté sur **Montserrat** pour son caractère premium et classique, en cohérence avec le positionnement haut de gamme de Stelya. Ma proposition initiale orientée vers **Space Grotesk**, dont la géométrie technique aurait bien évoqué l'univers de l'ingénierie, a finalement laissé place à une typographie plus intemporelle, plus alignée avec les attentes du client.
      en: |
        After several discussions with the client, we settled on **Montserrat** for its premium, timeless character, in line with Stelya's high-end positioning. My initial proposal leaned toward **Space Grotesk**, whose geometric structure would have nicely echoed the engineering world, but we ultimately chose a more classic typeface that better matched the client's expectations.

