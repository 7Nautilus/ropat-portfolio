    pitch: "Création de l'**identité visuelle complète** pour **Moon VTC**, société de VTC en phase de lancement : logo, palette de couleurs, typographie et charte graphique."
    description: "Conception de l'**identité visuelle complète** de Moon VTC, société de transport avec chauffeur en phase de lancement. La mission comprenait la création d'un **set de logos**, une sélection de **palette de couleurs** et de **typographie**, ainsi qu'une **charte graphique** complète pour cadrer l'usage de ces éléments."
    services: "Identité visuelle, Création de logo, Charte graphique"
    context_title: "À propos du projet"
    context_content: |
      Contacté par Moon VTC alors que la société était en pleine phase de lancement, l'objectif était de construire une identité visuelle forte, cohérente et évocatrice, à la hauteur de l'ambition du service.

      ### # Univers & direction artistique
      La palette de couleurs de Moon VTC est une immersion dans l'atmosphère sereine de la nuit. 
      <br>**Bleu Nuit** : couleur de fondation, elle représente la profondeur de l'obscurité urbaine et le sérieux du service. 
      <br>**Bleu Canard** : cette nuance vibrante évoque les reflets des lumières de la ville et apporte une élégance contemporaine. 
      <br>**Violet Parme** : symbole de la lune et de la tranquillité, cette touche de violet adoucit l'ensemble et renforce le sentiment de sérénité. 
      <br>**Blanc Cassé** : utilisé pour la clarté et le contraste, il représente la lumière rassurante qui guide le passager.

      ### # Livrables
      Un set de logos complet (icône et version typographique, déclinaisons noires et blanches), une palette de couleurs documentée, une sélection typographique et une charte graphique encadrant les règles d'usage.

