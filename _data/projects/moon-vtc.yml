    services: "Visual Identity, Logo Design, Brand Guidelines"
    context_title: "About the project"
    context_content: |
      Contacted by Moon VTC during their launch phase, the goal was to build a strong, coherent and evocative visual identity - one that matches the ambition of the service.

      ### # Universe & art direction
      Moon VTC's color palette is an immersion into the serene atmosphere of the night. **Night Blue (#151E3D)**: the foundation color, representing the depth of urban darkness and the seriousness of the service. **Teal Blue (#006d77)**: this vibrant hue evokes city light reflections and brings contemporary elegance. **Parme Violet (#6559a1)**: a symbol of the moon and tranquility, this violet softens the whole and reinforces the feeling of serenity. **Off-White (#f4f6f9)**: used for clarity and contrast, it represents the reassuring light that guides the passenger.

      ### # Deliverables
      A complete logo set (icon and typographic versions, black and white variants), a documented color palette, a typography selection, and a brand guidelines document covering usage rules.

