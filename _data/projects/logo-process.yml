context_sections:
  - title:
      fr: "Contexte et objectif"
      en: "Context and objective"
    content:
      fr: |
        Pour ce projet j'ai voulu documenter le processus de création d'un logo géométrique, depuis l'esquisse initiale jusqu'à la version finale en 3D avec effets visuels. L'objectif était de montrer les différentes étapes de conception et les choix artistiques effectués tout au long du projet.
      en: |
        For this project, I wanted to document the process of creating a geometric logo, from the initial sketch to the final 3D version with visual effects. The goal was to showcase the different design stages and artistic choices made throughout the project.
  - title:
      fr: "Recherche et concept"
      en: "Research and concept"
    content:
      fr: |
        J'ai commencé par effectuer des recherches sur les tendances actuelles en matière de design de logo, en m'inspirant de formes géométriques et de palettes de couleurs modernes. J'ai ensuite esquissé plusieurs concepts, en me concentrant sur la simplicité et l'impact visuel.
      en: |
        I started by researching current trends in logo design, drawing inspiration from geometric shapes and modern color palettes. I then sketched several concepts, focusing on simplicity and visual impact.
  - title:
      fr: "Conception graphique"
      en: "Design execution"
    content:
      fr: |
        J'ai utilisé Illustrator pour créer la version vectorielle du logo, en veillant à respecter des proportions parfaitement équilibrées, pour ce faire je m'en suis tenu à deux formes, un cercle de 2 pixels de diamètre et un autre de 6 pixels de diamètre. Une fois le sketch terminé j'ai modélisé le logo en 3D, toujours sur Illustrator.
      en: |
        I used Illustrator to create the vector version of the logo, ensuring perfectly balanced proportions by sticking to two shapes: a 2-pixel diameter circle and a 6-pixel diameter circle. Once the sketch was complete, I modeled the logo in 3D, still using Illustrator.
  - title:
      fr: "Finitions et rendu"
      en: "Finishing touches"
    content:
      fr: |
        Pour la version finale, j'ai ajouté des effets visuels sur mon modèle 3D, en jouant avec les ombres, les zones de lumière, les contrastes et le grain pour donner plus de profondeur et d'identité au logo. Le rendu final met en valeur la géométrie du logo tout en lui conférant un aspect moderne et dynamique.
      en: |
        For the final version, I added visual effects to my 3D model, playing with shadows, light areas, contrasts, and grain to give more depth and identity to the logo. The final render highlights the logo's geometry while giving it a modern and dynamic look.

