context_sections:
  - title:
      fr: "Direction graphique & Co-branding Sephora"
      en: "Graphic Direction & Sephora Co-branding"
    content:
      fr: |
        Intégration des codes esthétiques de la maison pour le lancement du parfum Banana Rush. L'enjeu majeur de cette campagne reposait sur une double déclinaison systématique : une version standard pour la marque, et une version co-brandée spécifiquement pour Sephora, intégrant harmonieusement leurs éléments d'identité visuelle respectifs sur l'ensemble des compositions.
      en: |
        Integration of the house’s aesthetic codes for the launch of the Banana Rush fragrance. The main challenge of this campaign relied on a systematic dual layout: a standard brand version and a co-branded version specifically for Sephora, seamlessly blending both brand identities across all layouts.
  - title:
      fr: "Architecture créative & Concepts"
      en: "Creative Architecture & Concepts"
    content:
      fr: |
        La campagne a été structurée autour de 10 concepts visuels forts, adaptés à des objectifs de conversion différents : 7 concepts purement statiques axés sur l'impact visuel du flacon, 1 concept exclusivement axé sur le mouvement (vidéo), et 2 concepts hybrides déclinés à la fois en statique et en motion design pour maximiser la mémorisation sur Meta Ads.
      en: |
        The campaign was structured around 10 distinct visual concepts tailored to different conversion goals: 7 static-only concepts focused on the bottle's visual impact, 1 video-only concept, and 2 hybrid concepts developed in both static and motion design formats to maximize brand recall on Meta Ads.
  - title:
      fr: "Déploiement bilingue & Multi-format"
      en: "Bilingual Deployment & Multi-format Rollout"
    content:
      fr: |
        Pour couvrir l'ensemble des placements publicitaires, chaque concept et chaque déclinaison (standard et Sephora) ont été rigoureusement adaptés sur 3 ratios clés (carré 1:1, portrait 4:5 et stories 9:16). L'ensemble de la campagne a également fait l'objet d'une adaptation bilingue (français/anglais), représentant un important volume d'assets finaux parfaitement calibrés pour une diffusion internationale.
      en: |
        To ensure complete ad placement coverage, every concept and variation (both standard and Sephora) was meticulously adapted to 3 key ratios (1:1 square, 4:5 portrait, and 9:16 stories). The entire campaign was also rolled out in bilingual versions (French/English), delivering a high-volume library of assets optimized for global markets.

