    description: "Conception de l'ensemble des **assets statiques et animés** pour la campagne paid social de lancement de la gamme **Banana Rush** de **Juliette has a Gun**. Campagne déclinée en **3 phases**, sur les formats 1:1, 4:5 et 9:16, en anglais et en français."
    services: "Motion Design, Création d'assets paid social, Déclinaisons multi-formats"
    context_title: "À propos de la campagne"
    context_content: |
      ### # Phase 1 - Lancement
      Conception des visuels clés et des premières animations annonçant l'arrivée de la gamme Banana Rush. Les assets ont été déclinés sur 3 formats de placement : carré 1:1, portrait 4:5 et stories/reels 9:16.

      ### # Phase 2 - Gamme complète
      Présentation individuelle de chaque fragrance de la gamme. 8 déclinaisons produits disponibles en statics et en motion, sur les 3 formats - pour un total de 24 assets statiques et 9 vidéos sur cette phase.

      ### # Phase 3 - Storytelling olfactif
      Mise en avant de l'univers sensoriel de la gamme à travers des visuels narratifs : desserts, pile de flacons, flambé banane. Animations complémentaires sur les ingrédients et la composition olfactive. Versions bilingues anglais/français pour une diffusion internationale.

