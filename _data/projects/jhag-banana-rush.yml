      ### # Phase 1 - Launch
      Design of key visuals and first animations announcing the arrival of the Banana Rush line. Assets adapted to 3 placement formats: square 1:1, portrait 4:5, and stories/reels 9:16.

      ### # Phase 2 - Full Range
      Individual visuals for each fragrance in the lineup. 8 product variants available as statics and motion, across all 3 formats - totalling 24 static assets and 9 videos for this phase.

      ### # Phase 3 - Olfactory Storytelling
      Highlighting the sensory world of the line through narrative visuals: desserts, flacon stacks, banana flambé. Complementary animations on ingredients and olfactory composition. Bilingual English/French versions for international reach.

