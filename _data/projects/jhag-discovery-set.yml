context_sections:
  - title:
      fr: "Mécanique publicitaire & Anti 'Blind Buy'"
      en: "Ad Mechanics & Anti-Blind Buy Strategy"
    content:
      fr: |
        Mise en avant graphique de la mécanique de conversion "Try before you buy" pour le Coffret Découverte. L'objectif créatif était de lever le frein de l'achat de parfum en ligne (l'achat à l'aveugle ou *blind buy*) en valorisant une offre imparable : tester l'ensemble des bestsellers de la maison pour 30€, intégralement remboursés sous forme de bon d'achat sur le parfum de son choix.
      en: |
        Graphic curation of the "Try before you buy" conversion mechanics for the Discovery Set. The creative challenge was to overcome the friction of online fragrance shopping (blind buying) by highlighting an irresistible offer: test all the house's bestsellers for €30, fully refundable as a voucher towards a full-size favorite bottle.
  - title:
      fr: "Territoires visuels & Scénographies"
      en: "Visual Territories & Set Design"
    content:
      fr: |
        Habillage graphique et intégration de la copy publicitaire sur 3 concepts visuels distincts transmis par la maison. Un premier univers rose fuchsia épuré axé sur l'offre brute ; un second univers gris texturé mettant en scène les ingrédients naturels des fragrances (citron vert, vanille, lavande) ; et un troisième univers jaune safran au stylisme lifestyle affirmé évoquant un rituel d'écriture et de sélection.
      en: |
        Ad layouts and copy integration across 3 distinct visual environments provided by the brand. The first, a minimalist fuchsia pink setup focusing on the raw offer; the second, a textured grey environment highlighting the natural ingredients of the fragrances (lime, vanilla, lavender); and the third, a saffron yellow setup with lifestyle-forward styling evoking a ritual of curation and writing.
  - title:
      fr: "Composition typographique & Multi-format"
      en: "Typographic Layout & Multi-format Execution"
    content:
      fr: |
        Hiérarchisation des messages publicitaires statiques et intégration de la charte typographique haut de gamme de la maison. Chaque concept visuel a été minutieusement adapté sur 3 ratios clés (carré 1:1, portrait 4:5 et stories 9:16) tout en optimisant la lisibilité des textes d'accroche ("sans engagement", "-30€") en versions bilingues français/anglais.
      en: |
        Information hierarchy and integration of the brand's premium typographic guidelines. Each static concept was meticulously adapted to 3 key ratios (1:1 square, 4:5 portrait, and 9:16 stories) while focusing on the high-impact legibility of key conversion hooks ("risk-free", "€30 off") in bilingual English/French versions.

