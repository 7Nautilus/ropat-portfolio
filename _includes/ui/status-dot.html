{% comment %}
  Pastille de disponibilite (vert, pulsee). Utilisee sur la home et la page about.
  La couleur vient du token --color-success, applique via la classe .status-dot.
{% endcomment %}
<svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg" class="animate-pulse" aria-hidden="true">
  <circle cx="5" cy="5" r="5" class="status-dot"/>
</svg>
