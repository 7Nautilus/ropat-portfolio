{% assign current_lang = page.lang | default: 'en' %}
{% assign exp = include.experience %}

<article class="card experience-card">
  <span class="experience-card-date">{{ exp.date[current_lang] }}</span>
  <div class="experience-card-job">
    <h2 class="experience-card-title">{{ exp.title[current_lang] }}</h2>
    <span class="experience-card-separator" aria-hidden="true">-</span>
    <span class="experience-card-work">{{ exp.work[current_lang] }}</span>
  </div>
  <span class="experience-card-company">{{ exp.company }}</span>
  <div class="experience-card-text">
    <p class="experience-card-description">{{ exp.description[current_lang] }}</p>
    <div class="experience-card-tags">
      {% for tag in exp.tags %}
        <span class="experience-card-tag">{{ tag }}</span>
      {% endfor %}
    </div>
  </div>
</article>
